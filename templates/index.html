<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 House Price Predictor</title>
    <!-- Jinja2 Syntax එකෙන් static CSS එක link කරනවා -->
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    <!-- Modern Fonts: Inter සහ Segoe UI mix එකක් -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header class="app-header">
            <h1>🏠 House Price Predictor</h1>
            <p class="subtitle">AI-Powered ML Prediction</p>
        </header>

        <main class="main-content">
            <!-- Form Submission Logic for Smooth Fetch Call -->
            <form id="predictionForm" class="predict-form">
                <div class="form-group">
                    <label for="size">📐 House Size (sq ft)</label>
                    <input type="number" id="size" placeholder="e.g. 2000" min="500" max="10000" required>
                    <span class="input-hint">Range: 500 - 10,000 sq ft</span>
                </div>

                <div class="form-group">
                    <label for="bedrooms">🛏️ Bedrooms</label>
                    <input type="number" id="bedrooms" placeholder="e.g. 3" min="1" max="10" required>
                    <span class="input-hint">Range: 1 - 10</span>
                </div>

                <div class="form-group">
                    <label for="age">📅 House Age (years)</label>
                    <input type="number" id="age" placeholder="e.g. 5" min="1" max="50" required>
                    <span class="input-hint">Range: 1 - 50 years</span>
                </div>

                <button type="submit" id="submitBtn">🔮 Predict Price</button>
            </form>

            <!-- Success Card -->
            <div class="result hidden" id="resultContainer">
                <p class="result-label">Predicted Price</p>
                <div class="price" id="predictedPrice">$0</div>
                <p class="result-footer">AI prediction based on size, bedrooms & age</p>
            </div>

            <!-- Error Card -->
            <div class="error-card hidden" id="errorContainer">
                <p id="errorMessage"></p>
            </div>
        </main>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const resultContainer = document.getElementById('resultContainer');
            const errorContainer = document.getElementById('errorContainer');
            
            // Loading State UI
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";
            resultContainer.classList.add('hidden');
            errorContainer.classList.add('hidden');

            const size = document.getElementById('size').value;
            const bedrooms = document.getElementById('bedrooms').value;
            const age = document.getElementById('age').value;

            try {
                // FastAPI Endpoint Call
                const response = await fetch(`/predict?size=${size}&bedrooms=${bedrooms}&age=${age}`);
                const data = await response.json();

                if (response.ok && data.status === "success") {
                    document.getElementById('predictedPrice').innerText = data.predicted_price;
                    resultContainer.classList.remove('hidden');
                } else {
                    // API Validation Errors (HTTP 400 Bad Request) හෝ Custom Errors අල්ලනවා
                    const errMsg = data.detail || data.error || "ඇතුළත් කළ දත්ත වැරදියි!";
                    document.getElementById('errorMessage').innerHTML = `❌ ${errMsg}`;
                    errorContainer.classList.remove('hidden');
                }
            } catch (err) {
                document.getElementById('errorMessage').innerHTML = "❌ Error: API එකට සම්බන්ද වෙන්න බෑ!";
                errorContainer.classList.remove('hidden');
            } finally {
                // Reset Button
                submitBtn.disabled = false;
                submitBtn.innerText = "🔮 Predict Price";
            }
        });
    </script>
</body>
</html>
